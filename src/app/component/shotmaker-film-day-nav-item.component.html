  <div class="film-day-item">
    <span class="film-day-item-text">{{filmDay.dateString}}</span>
    <span *ngIf="filmDay.warnings.length > 0 || filmDay.childWarnings.length > 0"
          class="film-day-item-icon"
          uk-icon="warning"
          [attr.uk-tooltip]="'title: There are multiple warnings for this film day'">
    </span>
  </div>
