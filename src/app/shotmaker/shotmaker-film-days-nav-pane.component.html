<div class="sticky-side-nav">
  <ul class="uk-nav uk-nav-default">
    @for (filmDay of filmDays; track filmDay) {
    <li routerLinkActive="uk-active" class="scene-list-item uk-text-truncate" #filmDayElement [attr.id]="'film-day-' + filmDay.date">
      <a routerLink="/shotmaker/{{project.id}}" [queryParams]="{ tab: 'film-days', filmDayId: filmDay.date}">
        <app-shotmaker-film-day-nav-item [filmDay]="filmDay"></app-shotmaker-film-day-nav-item>
      </a>
    </li>
    }
  </ul>
</div>
